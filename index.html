<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ENG Pulling">
  <meta name="description" content="Checklist de acciones correctivas para operaciones Pulling — CGC">
  <link rel="manifest" href="manifest.json">
  <title>ENG Pulling CGC</title>
  <style>
    :root{--teal:#1D9E75;--teal-dk:#0F6E56;--teal-lt:#E1F5EE;--black:#111111;--white:#FFFFFF;--g50:#F8F8F7;--g100:#EFEFED;--g200:#DEDCDA;--g300:#C5C3BE;--g400:#9B9893;--g600:#5F5E5A;--red:#A32D2D;--amber:#BA7517;--green:#3B6D11;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--g50);color:var(--black);font-size:14px}
    body{min-height:100vh;min-height:100dvh}
    .topbar{background:var(--black);padding:calc(var(--safe-top) + 10px) 14px 10px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
    .topbar-logo{font-size:16px;font-weight:700;letter-spacing:3px;color:var(--white);line-height:1}
    .topbar-bar{height:3px;background:var(--teal);border-radius:2px;margin-top:3px}
    .topbar-sep{width:1px;height:26px;background:#333}
    .topbar-info{flex:1}
    .topbar-title{font-size:13px;font-weight:600;color:var(--white)}
    .topbar-sub{font-size:10px;color:#888;margin-top:1px}
    .topbar-badge{background:var(--teal);color:var(--white);padding:3px 9px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap}
    .scroll{padding:12px 12px calc(var(--safe-bot) + 70px)}
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px}
    .stat{background:var(--white);border:1px solid var(--g200);border-radius:10px;padding:9px 6px;text-align:center}
    .stat-label{font-size:9px;color:var(--g400);margin-bottom:2px;text-transform:uppercase;letter-spacing:.4px}
    .stat-value{font-size:19px;font-weight:700;font-variant-numeric:tabular-nums}
    .prog-wrap{margin-bottom:10px}
    .prog-track{height:5px;background:var(--g100);border-radius:3px;overflow:hidden}
    .prog-fill{height:5px;background:var(--teal);border-radius:3px;transition:width .4s ease}
    .prog-label{font-size:11px;color:var(--g400);margin-top:3px}
    .meta-row{display:flex;gap:6px;margin-bottom:10px}
    .meta-field{flex:1;display:flex;flex-direction:column;gap:3px}
    .meta-label{font-size:10px;color:var(--g400);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
    .meta-input{border:1px solid var(--g200);border-radius:8px;padding:7px 10px;font-size:12px;color:var(--black);background:var(--white);font-family:inherit;width:100%}
    .meta-input:focus{outline:none;border-color:var(--teal)}
    .export-row{display:flex;gap:6px;margin-bottom:10px}
    .export-btn{flex:1;border:1px solid var(--g200);border-radius:9px;padding:9px 4px;background:var(--white);cursor:pointer;font-size:12px;font-weight:500;color:var(--g600);display:flex;align-items:center;justify-content:center;gap:4px;font-family:inherit}
    .export-btn:active{background:var(--g50)}
    .cia-tabs{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;margin-bottom:8px;scrollbar-width:none}
    .cia-tabs::-webkit-scrollbar{display:none}
    .cia-tab{display:flex;align-items:center;gap:5px;white-space:nowrap;padding:5px 12px;border-radius:8px;border:1px solid var(--g200);background:var(--white);cursor:pointer;font-size:12px;color:var(--g600);font-family:inherit;font-weight:500}
    .cia-tab.active{background:var(--black);border-color:var(--black);color:var(--white)}
    .cia-count{font-size:10px;background:var(--g100);padding:1px 5px;border-radius:8px;color:var(--g600);font-variant-numeric:tabular-nums}
    .cia-tab.active .cia-count{background:rgba(255,255,255,.15);color:var(--white)}
    .filters{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;scrollbar-width:none}
    .filters::-webkit-scrollbar{display:none}
    .filter-chip{display:flex;align-items:center;gap:4px;white-space:nowrap;padding:5px 10px;border-radius:20px;border:1px solid var(--g200);background:var(--white);cursor:pointer;font-size:11px;color:var(--g600);font-family:inherit}
    .filter-chip.active{background:var(--teal);border-color:var(--teal);color:var(--white)}
    .filter-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
    .filter-count{font-size:10px;background:var(--g100);padding:1px 5px;border-radius:10px;color:var(--g600);font-variant-numeric:tabular-nums}
    .filter-chip.active .filter-count{background:rgba(255,255,255,.25);color:var(--white)}
    .section-label{font-size:10px;color:var(--g400);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
    .group-header{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--white);border:1px solid var(--g200);border-radius:10px;margin-bottom:5px;margin-top:10px}
    .group-header:first-child{margin-top:0}
    .group-left{display:flex;align-items:center;gap:6px;flex:1}
    .group-cia{font-size:12px;font-weight:700;color:var(--black)}
    .eq-badge-group{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;letter-spacing:.4px}
    .group-stats{display:flex;align-items:center;gap:6px}
    .group-pbar{width:50px;height:4px;background:var(--g200);border-radius:2px;overflow:hidden}
    .group-fill{height:4px;border-radius:2px;transition:width .3s}
    .group-count{font-size:11px;color:var(--g400);font-variant-numeric:tabular-nums;white-space:nowrap}
    .card{background:var(--white);border:1px solid var(--g200);border-radius:10px;margin-bottom:6px;overflow:hidden}
    .card-header{display:flex;align-items:flex-start;gap:8px;padding:10px 11px;cursor:pointer;background:var(--g50)}
    .card-header:active{background:var(--g100)}
    .card-mid{flex:1;min-width:0}
    .card-top-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap}
    .card-clas{font-size:9px;font-weight:700;padding:1px 6px;border-radius:5px;letter-spacing:.3px}
    .card-id{font-size:10px;color:var(--g400);font-variant-numeric:tabular-nums}
    .card-desc{font-size:12px;font-weight:500;color:var(--black);line-height:1.4}
    .card-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
    .mini-pbar{width:36px;height:4px;background:var(--g200);border-radius:2px;overflow:hidden}
    .mini-fill{height:4px;border-radius:2px}
    .card-count{font-size:10px;color:var(--g400);font-variant-numeric:tabular-nums}
    .chevron{font-size:17px;color:var(--g400);display:inline-block;transition:transform .2s}
    .card-body{border-top:1px solid var(--g100)}

    /* ── IMAGEN COMPACTA (thumbnail pequeño) ── */
    .card-img-wrap{display:flex;align-items:center;justify-content:flex-start;border-bottom:1px solid var(--g100);background:var(--g50);padding:5px 11px;gap:10px}
    .card-img{height:52px;width:auto;max-width:130px;border-radius:5px;object-fit:cover;display:block;flex-shrink:0}
    .card-img-label{font-size:10px;color:var(--g400);line-height:1.4}

    .actions-list{padding:5px 8px 8px;display:flex;flex-direction:column;gap:2px}
    .action-row{display:flex;align-items:flex-start;gap:7px;padding:7px 7px;border-radius:7px;cursor:pointer}
    .action-row:active{filter:brightness(.97)}
    .cb{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--g300);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;margin-top:1px}
    .cb-done{background:var(--teal);border-color:var(--teal);color:var(--white)}
    .action-body{flex:1;min-width:0}
    .action-desc{font-size:12px;color:var(--black);line-height:1.4}
    .action-row.done .action-desc{text-decoration:line-through;color:var(--g400)}
    .action-meta{display:flex;gap:8px;margin-top:2px;flex-wrap:wrap}
    .action-resp{font-size:10px;color:var(--g400);flex:1;min-width:0}
    .action-date{font-size:10px;font-weight:500}
    .empty{text-align:center;padding:40px 16px;color:var(--g400)}
    .empty-icon{font-size:32px;margin-bottom:8px}
    .empty p{font-size:13px}

    /* ── FAB ── */
    .fab{position:fixed;bottom:calc(var(--safe-bot) + 18px);right:16px;background:var(--black);color:var(--white);width:54px;height:54px;border-radius:27px;border:none;font-size:28px;cursor:pointer;z-index:99;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(0,0,0,.3);font-family:inherit;line-height:1}
    .fab:active{background:var(--teal-dk);transform:scale(.95)}

    /* ── MODAL ── */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal{background:var(--white);border-radius:18px 18px 0 0;padding:20px 16px calc(var(--safe-bot) + 24px);width:100%;max-width:480px;max-height:90dvh;overflow-y:auto}
    .modal-handle{width:36px;height:4px;background:var(--g200);border-radius:2px;margin:0 auto 16px}
    .modal-title{font-size:16px;font-weight:700;margin-bottom:4px;color:var(--black)}
    .modal-subtitle{font-size:12px;color:var(--g400);margin-bottom:16px}
    .m-field{margin-bottom:12px}
    .m-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--g400);margin-bottom:4px;display:block}
    .m-input,.m-select,.m-textarea{width:100%;padding:10px 12px;border:1px solid var(--g200);border-radius:10px;font-family:inherit;font-size:13px;color:var(--black);background:var(--g50)}
    .m-input:focus,.m-select:focus,.m-textarea:focus{outline:none;border-color:var(--teal);background:var(--white)}
    .m-textarea{min-height:72px;resize:vertical}
    .m-hint{font-size:11px;color:var(--g400);margin-top:3px}
    .m-actions{display:flex;gap:8px;margin-top:16px}
    .m-cancel{flex:1;padding:12px;border:1px solid var(--g200);border-radius:11px;background:var(--white);font-family:inherit;font-size:13px;cursor:pointer;color:var(--g600)}
    .m-save{flex:2;padding:12px;background:var(--black);color:var(--white);border:none;border-radius:11px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
    .m-save:active{background:var(--teal-dk)}

    /* ── OP TABS ── */
    .op-tabs{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;margin-bottom:8px;scrollbar-width:none}
    .op-tabs::-webkit-scrollbar{display:none}
    .op-tab{display:flex;align-items:center;gap:5px;white-space:nowrap;padding:5px 12px;border-radius:8px;border:1px solid var(--g200);background:var(--white);cursor:pointer;font-size:12px;color:var(--g600);font-family:inherit;font-weight:500}
    .op-tab.active{background:var(--black);border-color:var(--black);color:var(--white)}
    .op-count{font-size:10px;background:var(--g100);padding:1px 5px;border-radius:8px;color:var(--g600);font-variant-numeric:tabular-nums}
    .op-tab.active .op-count{background:rgba(255,255,255,.15);color:var(--white)}
    /* ── FOTO UPLOAD ── */
    .foto-area{border:1.5px dashed var(--g200);border-radius:10px;padding:14px;text-align:center;cursor:pointer;background:var(--g50);position:relative;overflow:hidden}
    .foto-area:active{background:var(--g100)}
    .foto-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .foto-icon{font-size:24px;margin-bottom:4px}
    .foto-label{font-size:12px;color:var(--g400);display:block}
    #m-foto-preview{width:100%;max-height:100px;object-fit:cover;border-radius:7px;display:none;margin-bottom:6px}
    /* ── AGREGAR ACCIÓN INLINE ── */
    .add-ac-inline{padding:6px 8px 10px;border-top:1px dashed var(--g100)}
    .add-ac-trigger{width:100%;padding:8px;background:transparent;border:1.5px dashed var(--g200);border-radius:8px;font-size:12px;color:var(--teal);font-weight:600;cursor:pointer;font-family:inherit;text-align:center}
    .add-ac-trigger:active{background:var(--teal-lt)}
    .add-ac-fields{display:flex;flex-direction:column;gap:6px;margin-bottom:6px}
    .add-ac-input{padding:8px 10px;border:1px solid var(--g200);border-radius:8px;font-size:12px;font-family:inherit;color:var(--black);background:var(--white);width:100%}
    .add-ac-input:focus{outline:none;border-color:var(--teal)}
    .add-ac-row{display:flex;gap:6px}
    .add-ac-btns{display:flex;gap:6px}
    .add-ac-cancel{flex:1;padding:8px;border:1px solid var(--g200);border-radius:8px;background:var(--white);font-size:12px;font-family:inherit;cursor:pointer;color:var(--g600)}
    .add-ac-save{flex:2;padding:8px;background:var(--black);color:var(--white);border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
    .add-ac-save:active{background:var(--teal-dk)}
    /* ── OBSERVACIONES ── */
    .obs-row{padding:4px 8px 6px 38px;border-radius:0 0 7px 7px;border-top:1px dashed var(--g100)}
    .obs-input{width:100%;border:none;background:transparent;font-size:11px;color:var(--g600);font-family:inherit;resize:none;min-height:30px;line-height:1.4;outline:none;padding:2px 0}
    .obs-input::placeholder{color:var(--g300)}
    .obs-input:focus{color:var(--black)}
    /* ── BOTONES ELIMINAR ── */
    .btn-del-ev{background:none;border:none;cursor:pointer;font-size:14px;padding:2px 4px;color:var(--g300);border-radius:5px;line-height:1;transition:color .15s,background .15s}
    .btn-del-ev:active{color:var(--red);background:#FEE2E2}
    .btn-del-ac{background:none;border:none;cursor:pointer;font-size:17px;color:var(--g300);padding:0 2px;line-height:1;flex-shrink:0;transition:color .15s}
    .btn-del-ac:active{color:var(--red)}
    /* ── LIGHTBOX ── */
    #lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;align-items:center;justify-content:center;padding:16px}
    #lb-img{max-width:100%;max-height:90dvh;border-radius:8px;object-fit:contain;display:block}
    .lb-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
    /* ── MODAL ACCIONES ── */
    .m-acciones-add{background:var(--g50);border:1px solid var(--g200);border-radius:10px;padding:10px}
    .m-ac-row{display:flex;gap:6px;margin-bottom:6px}
    .m-ac-row .m-input{flex:1}
    .m-ac-btn{padding:9px 14px;background:var(--black);color:var(--white);border:none;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit}
    .m-ac-btn:active{background:var(--teal-dk)}
    /* ── TOAST ── */
    .toast{position:fixed;bottom:calc(var(--safe-bot) + 82px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--black);color:var(--white);padding:9px 18px;border-radius:20px;font-size:13px;opacity:0;transition:all .25s;pointer-events:none;z-index:300;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>

<div class="topbar">
  <div><div class="topbar-logo">CGC</div><div class="topbar-bar"></div></div>
  <div class="topbar-sep"></div>
  <div class="topbar-info"><div class="topbar-title">ENG Pulling</div><div class="topbar-sub">Acciones Correctivas</div></div>
  <div class="topbar-badge" id="topbar-pct">0%</div>
</div>

<div class="scroll">
  <div class="stats-grid">
    <div class="stat"><div class="stat-label">Total</div><div class="stat-value" id="s-total">0</div></div>
    <div class="stat"><div class="stat-label">Completadas</div><div class="stat-value" style="color:var(--teal)" id="s-done">0</div></div>
    <div class="stat"><div class="stat-label">Pendientes</div><div class="stat-value" style="color:var(--amber)" id="s-pend">0</div></div>
    <div class="stat"><div class="stat-label">Vencidas</div><div class="stat-value" style="color:var(--red)" id="s-venc">0</div></div>
  </div>
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="prog-label" id="prog-label">Cargando...</div>
  </div>
  <div class="meta-row">
    <div class="meta-field">
      <label class="meta-label" for="review-by">Relevado por</label>
      <input class="meta-input" id="review-by" type="text" placeholder="Nombre del relevador">
    </div>
    <div class="meta-field">
      <label class="meta-label" for="review-lugar">Lugar</label>
      <input class="meta-input" id="review-lugar" type="text" placeholder="Locación / área">
    </div>
    <div class="meta-field" style="max-width:130px">
      <label class="meta-label" for="review-date">Fecha</label>
      <input class="meta-input" id="review-date" type="date">
    </div>
  </div>
  <div class="export-row">
    <button class="export-btn" onclick="exportPDF()">📄 Exportar PDF</button>
    <button class="export-btn" onclick="exportCSV()">📊 Exportar Excel</button>
  </div>
  <div class="op-tabs" id="op-tabs"></div>
  <div class="cia-tabs" id="cia-tabs"></div>
  <div class="filters" id="filters"></div>
  <div class="section-label" id="section-count"></div>
  <div id="events-container"></div>
</div>

<!-- FAB -->
<button class="fab" onclick="openModal()" title="Agregar evento no deseado">+</button>

<!-- MODAL NUEVO EVENTO -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Nuevo evento no deseado</div>
    <div class="modal-subtitle">Completá los datos del evento para registrarlo</div>

    <!-- ID y FECHA -->
    <div class="m-row">
      <div class="m-field">
        <label class="m-label" for="m-id">ID del evento</label>
        <input class="m-input" id="m-id" type="text" placeholder="Ej: 2545">
      </div>
      <div class="m-field">
        <label class="m-label" for="m-fecha">Fecha</label>
        <input class="m-input" id="m-fecha" type="text" placeholder="dd/mm/aaaa">
      </div>
    </div>

    <!-- TÍTULO -->
    <div class="m-field">
      <label class="m-label" for="m-titulo">Título del evento</label>
      <input class="m-input" id="m-titulo" type="text" placeholder="Ej: Caída de objeto en boca de pozo">
    </div>

    <!-- DESCRIPCIÓN -->
    <div class="m-field">
      <label class="m-label" for="m-desc">Descripción del evento</label>
      <textarea class="m-textarea" id="m-desc" placeholder="Describí brevemente qué ocurrió, cómo y dónde"></textarea>
    </div>

    <!-- CONTRATISTA y EQUIPO -->
    <div class="m-row">
      <div class="m-field">
        <label class="m-label" for="m-cia-new">Contratista</label>
        <input class="m-input" id="m-cia-new" type="text" placeholder="Nombre de la empresa">
      </div>
      <div class="m-field">
        <label class="m-label" for="m-equipo-new">Equipo</label>
        <input class="m-input" id="m-equipo-new" type="text" placeholder="Ej: E101, RIG-5">
      </div>
    </div>

    <!-- TIPO DE OPERACIÓN -->
    <div class="m-field">
      <label class="m-label">Tipo de operación</label>
      <select class="m-select" id="m-operacion">
        <option value="Pulling">⚙️ Pulling</option>
        <option value="Workover">🔧 Workover</option>
        <option value="Perforación">⛏️ Perforación</option>
      </select>
    </div>

    <!-- FOTO -->
    <div class="m-field">
      <label class="m-label">Foto del evento</label>
      <div class="foto-area" onclick="document.getElementById('m-foto-input').click()">
        <img id="m-foto-preview" src="" alt="preview">
        <div class="foto-icon">📷</div>
        <span class="foto-label" id="m-foto-label">Tocar para agregar foto</span>
        <input type="file" id="m-foto-input" accept="image/*" capture="environment" onchange="handleFotoInput(this)" style="display:none">
      </div>
    </div>

    <!-- ACCIONES CORRECTIVAS -->
    <div class="m-field">
      <label class="m-label">Acciones correctivas</label>
      <div id="m-acciones-list" style="margin-bottom:8px"></div>
      <div class="m-acciones-add">
        <div style="font-size:11px;color:var(--g400);margin-bottom:6px;font-weight:600">+ Agregar acción</div>
        <input class="m-input" id="m-ac-desc" type="text" placeholder="Descripción de la acción" style="margin-bottom:6px">
        <div class="m-ac-row">
          <input class="m-input" id="m-ac-resp" type="text" placeholder="Responsable">
          <input class="m-input" id="m-ac-fecha" type="text" placeholder="Fecha">
          <button class="m-ac-btn" onclick="addModalAccion()">+</button>
        </div>
      </div>
    </div>

    <div class="m-actions">
      <button class="m-cancel" onclick="closeModal()">Cancelar</button>
      <button class="m-save" onclick="saveEvent()">Registrar evento</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <img id="lb-img" src="" alt="Foto ampliada">
</div>

<script src="app.js"></script>
</body>
</html>
